name: Validate And Deploy Cloudflare Apps

on:
  pull_request:
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "frontend/**"
      - "backend/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "frontend/**"
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-apps-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Start backend worker for load smoke
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          nohup npx wrangler dev --port 8787 --ip 127.0.0.1 > /tmp/pinequest-backend-smoke.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8787/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/pinequest-backend-smoke.log
          exit 1

      - name: Load smoke
        run: npm run test:load:smoke:ci

  deploy-frontend:
    name: Deploy frontend to Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate-frontend
      - validate-backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy out --project-name=educore

  deploy-backend:
    name: Deploy backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate-frontend
      - validate-backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
